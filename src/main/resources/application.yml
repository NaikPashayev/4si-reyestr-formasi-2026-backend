server:
  port: ${PORT:8080}
app:
  admin:
    password: ${ADMIN_PASSWORD:change-me-now}
    token-secret: ${ADMIN_TOKEN_SECRET:replace-this-with-a-long-random-secret}
    token-ttl-hours: ${ADMIN_TOKEN_TTL_HOURS:12}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}
spring:
  datasource:
    url: ${DATABASE_URL:jdbc:h2:file:/data/innovate-registry;AUTO_SERVER=TRUE}
    driver-class-name: org.h2.Driver
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: false
